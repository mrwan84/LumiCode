<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#1E1E2F"/>

  <!-- Outer RGB ring -->
  <circle cx="32" cy="32" r="20" stroke="url(#rgbRing)" stroke-width="6"/>

  <!-- Inner LED dot -->
  <circle cx="32" cy="32" r="10" fill="#FFFFFF" opacity="0.8"/>

  <!-- Code brackets -->
  <text x="32" y="38" text-anchor="middle" font-size="16" font-family="monospace" fill="#FFD93D">{}</text>

  <defs>
    <!-- RGB gradient ring -->
    <linearGradient id="rgbRing" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B6B"/>
      <stop offset="0.5" stop-color="#FFD93D"/>
      <stop offset="1" stop-color="#6BCB77"/>
    </linearGradient>
  </defs>
</svg>
